generations:
  - name: "First Generation"
    start_year: 2018
    end_year: 2023
    description: "The Audi Q8 is the brand's first coupe-SUV and serves as its flagship SUV model. Built on the MLB Evo platform shared with the Q7, it features a more aggressive, sporty design with a sloping roofline, frameless doors, and distinctive styling elements including an octagonal single-frame grille. The initial generation launched in June 2018 with European sales beginning in July 2018. Engine options include V6 and V8 TFSI petrol and TDI diesel units with mild-hybrid technology standard. The interior features Audi's dual-touchscreen MMI system and virtual cockpit digital instruments. The SQ8 performance variant launched in June 2019 with a 4.0-litre V8 diesel engine. The RS Q8, featuring a 4.0-litre twin-turbo V8 petrol engine producing 591 HP, was unveiled at the 2019 LA Auto Show."

  - name: "First Generation (2024 Facelift)"
    start_year: 2024
    end_year: null
    description: "The facelifted Q8 was unveiled on 5 September 2023 for the 2024 model year. Subtle exterior changes include larger air inlets in the front bumper and a new exhaust setup. The Singleframe grille now features octagonal elements flowing smoothly into the headlamps. The design of the Matrix LED headlights has been changed, with new high-tech laser lights increasing the range of high beams. Audi implemented OLED technology in the tail lamps as both an aesthetic feature and safety measure. The facelift adds three new metallic paint options (Chili Red, Ascari Blue, Sakhir Gold) and five alloy wheel designs ranging from 21 to 23 inches. The SQ8 features an increased 500 hp output from its 4.0-litre V8 petrol engine. In 2024, the RS Q8 was also facelifted with a Performance version introduced, featuring a 640 hp V8 engine."
